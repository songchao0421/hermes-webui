# Hermes WebUI - Nginx 反代配置
# 用途: HTTP→HTTPS 强制跳转 + 安全头 + 反代到 uvicorn
#
# 使用方法:
#   1. 先生成自签证书: bash scripts/gen-ssl.sh
#   2. 把此文件复制到 Nginx 配置目录并重载:
#      macOS: cp config/nginx.conf /usr/local/etc/nginx/servers/hermes-webui.conf
#      Linux:  cp config/nginx.conf /etc/nginx/sites-available/hermes-webui
#   3. 验证: nginx -t && nginx -s reload
#
# 端口映射:
#   浏览器 → :80 (HTTP)  → 301 跳转 → :443 (HTTPS) → uvicorn :8080
#   员工只需输入 http://192.168.1.20，自动跳到 https://192.168.1.20

# ── HTTP → HTTPS 强制跳转 ────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS 服务 ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # ── SSL 证书 ─────────────────────────────────────────────────
    ssl_certificate     ../certs/hermes-webui.crt;
    ssl_certificate_key ../certs/hermes-webui.key;

    # ── SSL 安全参数 ────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── 安全头 ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    server_tokens off;

    # ── 客户端真实 IP 转发 ──────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── 反代到 uvicorn ──────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;

        # SSE 长连接支持
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
